name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: Features
    labels:
      - feat
      - enhancement
  - title: Fixes
    labels:
      - fix
      - bug
  - title: Maintenance
    labels:
      - chore
      - dependencies
      - documentation

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: [major]
  minor:
    labels: [minor, feat]
  patch:
    labels: [patch, fix, bug]
  default: patch

autolabeler:
  - label: feat
    title:
      - '/^feat(\(.*\))?(!)?:/i'
  - label: bug
    title:
      - '/^fix(\(.*\))?(!)?:/i'
  - label: chore
    title:
      - '/^chore(\(.*\))?(!)?:/i'
  - label: documentation
    title:
      - '/^docs(\(.*\))?(!)?:/i'

template: |
  ## Changes

  $CHANGES
