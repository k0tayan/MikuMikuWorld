name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: Features
    labels:
      - feature
      - enhancement
  - title: Fixes
    labels:
      - fix
      - bug
  - title: Maintenance
    labels:
      - chore
      - dependencies
      - documentation

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: [major]
  minor:
    labels: [minor, feature]
  patch:
    labels: [patch, fix]
  default: patch

template: |
  ## Changes

  $CHANGES
