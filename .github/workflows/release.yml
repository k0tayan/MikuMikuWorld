name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-macos:
    name: Build and release (macOS universal)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show toolchain versions
        run: |
          sw_vers
          cmake --version
          xcodebuild -version
          clang --version

      - name: Cache FetchContent dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/_deps
          key: fetchcontent-universal-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-universal-

      - name: Configure
        run: cmake -S . -B build -G Xcode "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify .app bundle
        run: |
          APP="build/Release/MikuMikuWorld.app"
          test -d "$APP" || { echo "Bundle not found: $APP"; exit 1; }
          test -x "$APP/Contents/MacOS/MikuMikuWorld" || { echo "Executable missing"; exit 1; }
          test -d "$APP/Contents/Resources/res" || { echo "res/ not copied"; exit 1; }
          test -f "$APP/Contents/Resources/mmw_icon.icns" || { echo "Icon missing"; exit 1; }
          test -f "$APP/Contents/Info.plist" || { echo "Info.plist missing"; exit 1; }
          file "$APP/Contents/MacOS/MikuMikuWorld"
          lipo -archs "$APP/Contents/MacOS/MikuMikuWorld"

      - name: Package .app
        run: |
          ASSET="${{ runner.temp }}/MikuMikuWorld-${{ github.event.release.tag_name }}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent build/Release/MikuMikuWorld.app "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "$ASSET" \
            --repo "${{ github.repository }}" \
            --clobber

  release-linux:
    name: Build and release (Linux x86_64)
    runs-on: ubuntu-24.04
    env:
      BUILD_IMAGE: mmw-linux-build:ci
      RUNNER_IMAGE: mmw-linux-runner:ci
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build toolchain image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: .docker/Dockerfile.linux-render
          tags: ${{ env.BUILD_IMAGE }}
          load: true
          cache-from: type=gha,scope=build
          cache-to: type=gha,mode=max,scope=build

      - name: Build runner image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: .docker/Dockerfile.linux-runner
          tags: ${{ env.RUNNER_IMAGE }}
          load: true
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner

      - name: Show toolchain versions
        run: |
          lsb_release -a || true
          uname -m
          docker run --rm ${{ env.BUILD_IMAGE }} bash -c 'cmake --version && gcc --version | head -n1'

      - name: Cache FetchContent dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/_deps
          key: fetchcontent-linux-x86_64-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-linux-x86_64-

      - name: Configure
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$PWD:/workspace" \
            -w /workspace \
            ${{ env.BUILD_IMAGE }} \
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build mmw-render
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$PWD:/workspace" \
            -w /workspace \
            ${{ env.BUILD_IMAGE }} \
            cmake --build build --target mmw-render --parallel

      - name: Verify binary
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            ${{ env.RUNNER_IMAGE }} \
            bash -c '
              set -eo pipefail
              test -x build/mmw-render || { echo "mmw-render missing"; exit 1; }
              test -d build/res || { echo "res/ not copied"; exit 1; }
              file build/mmw-render
              ldd build/mmw-render
              if ldd build/mmw-render | grep -qi libX11; then
                echo "FAIL: libX11 was linked; headless build should not depend on X11"
                exit 1
              fi
              build/mmw-render --render --help | head -n 5
            '

      - name: Package tarball
        run: |
          NAME="MikuMikuWorld-${{ github.event.release.tag_name }}-linux-x86_64"
          STAGE="${{ runner.temp }}/$NAME"
          mkdir -p "$STAGE"
          cp build/mmw-render "$STAGE/"
          strip --strip-unneeded "$STAGE/mmw-render"
          cp -r build/res "$STAGE/"
          ASSET="${{ runner.temp }}/$NAME.tar.gz"
          tar -C "${{ runner.temp }}" -czf "$ASSET" "$NAME"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "$ASSET" \
            --repo "${{ github.repository }}" \
            --clobber
