name: Build

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show toolchain versions
        run: |
          sw_vers
          cmake --version
          xcodebuild -version
          clang --version

      - name: Cache FetchContent dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/_deps
          key: fetchcontent-${{ matrix.arch }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ matrix.arch }}-

      - name: Configure
        run: cmake -S . -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify .app bundle
        run: |
          APP="build/Release/MikuMikuWorld.app"
          test -d "$APP" || { echo "Bundle not found: $APP"; exit 1; }
          test -x "$APP/Contents/MacOS/MikuMikuWorld" || { echo "Executable missing"; exit 1; }
          test -d "$APP/Contents/Resources/res" || { echo "res/ not copied"; exit 1; }
          test -f "$APP/Contents/Resources/mmw_icon.icns" || { echo "Icon missing"; exit 1; }
          test -f "$APP/Contents/Info.plist" || { echo "Info.plist missing"; exit 1; }
          file "$APP/Contents/MacOS/MikuMikuWorld"

      - name: Upload .app bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: MikuMikuWorld-macOS-${{ matrix.arch }}
          path: build/Release/MikuMikuWorld.app
          if-no-files-found: error
